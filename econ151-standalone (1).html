<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const THEMES=[
  {id:"all",label:"All"},{id:"roles",label:"Changing Roles"},{id:"education",label:"Education"},
  {id:"family",label:"Family"},{id:"violence",label:"Violence"},{id:"wagegap",label:"Wage Gap"},
  {id:"penalty",label:"Motherhood"},{id:"development",label:"Norms & Dev"},{id:"sogie",label:"SOGIE"},
];

const LEARN_CONTENT=[
  {theme:"roles",title:"The Changing Economic Roles of Men and Women",week:"Week 1",content:[
    {heading:"Goldin (2006) — The Quiet Revolution",points:[
      "Phase I (1800s–1920s): Young unmarried women in manufacturing. Strong negative income effect from husband’s earnings. Marriage meant exit from the labor force.",
      "Phase II (1930s–1950): Clerical/office jobs expanded. High school education spread. Household appliances reduced domestic burden. Marriage bars declined. Married women began entering.",
      "Phase III (1950s–1970s): Rapid growth in married women’s LFP, but women remained ‘secondary workers’ — they accommodated husbands’ careers, underestimated their own future work, and chose low-advancement occupations.",
      "Phase IV (late 1970s–present): THE REVOLUTION. Women revised expectations about lifelong work, leading to more education, better-paying majors, professional training, and delayed marriage. Work became central to identity, not just supplementary income.",
      "Key mechanism: younger women observed older cohorts’ unexpected long-term labor force attachment and upgraded their investments. The birth control pill enabled delayed marriage. Both income and substitution elasticities declined as work became identity rather than a response to wages.",
      "Identification: historical/descriptive. Census data, NLS longitudinal surveys, historical employment records. Strength: comprehensive narrative across a century. Limitation: cannot isolate any single causal variable."
    ]},
    {heading:"Coile & Duggan (2019) — When Labor’s Lost",points:[
      "Documents the mirror image of Goldin: while women’s roles expanded, low-skilled men experienced broad deterioration — rising mortality from overdoses and suicides (2000–2016), increasing disability and obesity, declining marriage rates, and mass incarceration.",
      "Median earnings for all men flat since the early 1970s. Less-educated men experienced substantial real wage decreases.",
      "Education is the key protective factor. Declining military service reduced a source of training, structure, and benefits for non-college men.",
      "Connects to the course theme: gender convergence in employment came partly from men falling, not just women rising."
    ]}
  ]},
  {theme:"education",title:"Educational Gender Gaps",week:"Week 2",content:[
    {heading:"Goldin, Katz & Kuziemko (2006) — College Gender Gap Reversal",points:[
      "Data: U.S. high school classes of 1957, 1972, and 1992. Compares grades, test scores, courses taken, and college completion.",
      "About 40% of the female college advantage in 1992 is explained by superior high school preparation (mainly grades). The remaining 60% reflects deeper behavioral and aspirational gaps.",
      "Structural change: in 1957, families with fewer resources favored sons for college. By 1992, women were ahead at ALL SES levels, with the female advantage largest at the bottom — a complete reversal.",
      "Interpretation: falling barriers for women exposed boys’ pre-existing school problems. The authors emphasize ‘non-cognitive skills’ (discipline, effort, compliance)."
    ]},
    {heading:"The Boys’ Underperformance Debate",points:[
      "Reeves (2022): differential brain development means boys mature later. Recommends ‘redshirting’ (starting school a year later). Biological framing.",
      "DiPrete & Buchmann (2006): masculine identity formation involves ‘oppositional culture’ — rejection of school values, reinforced by peers, especially for boys with absent or low-education fathers. Social/norms framing.",
      "Lundberg (2020): Using Add Health data (U.S. longitudinal, birth cohorts 1976–84), the gender gap in educational aspirations CANNOT be explained by skills, behavior, family background, or school performance. ‘Kitchen sink’ regressions explain only 25–30%. Gender itself is the predictor.",
      "Course position: the tendency to frame boys’ problems as innate is ‘probably a mistake’ and ‘may be misleading for those designing interventions.’"
    ]},
    {heading:"Brenøe & Zölitz (2020) — Female Peers Widen the STEM Gap",points:[
      "Data: Danish administrative records, 182,000 students across 127 schools, cohorts 1980–1994, with 20-year follow-up through population registers.",
      "Identification: random variation in gender composition across cohorts within the same school. School fixed effects, cohort fixed effects, school-specific time trends, and cohort-by-school fixed effects (most restrictive possible). Balancing tests confirm randomness.",
      "A 10-percentage-point increase in female high school peers REDUCES women’s STEM enrollment by 6.4% and INCREASES men’s by 2.4%, widening the gender gap by 17%.",
      "Long-run: reduces women’s STEM employment by 4%, increases the gender wage gap by 5%, and increases women’s fertility by age 36.",
      "SURPRISING: more gender-balanced environments do NOT reduce gender gaps. Peer conformity pressure reinforces traditional norms.",
      "KEY MODERATOR: effect vanishes entirely for women whose mothers have STEM degrees. A salient individual role model overrides anonymous peer pressure.",
      "Contradicts Beaman et al. (2012), who found female village leaders in India RAISED girls’ aspirations. Resolution: anonymous peers (conformity) are not visible leaders (aspiration). Context matters: Denmark is already egalitarian; India has restrictive norms where any female leader is new information."
    ]}
  ]},
  {theme:"family",title:"Family Economics, Bargaining, and Divorce",week:"Weeks 3–5",content:[
    {heading:"The Gains to Marriage and Becker’s Framework",points:[
      "Five economic benefits: (1) economies of scale, (2) gains to specialization and exchange, (3) household public goods (housing, children), (4) risk-pooling, (5) consumption externalities (altruism, shared leisure).",
      "Becker (1981): women’s ‘heavy biological commitment to children’ gives comparative advantage in domestic work. Reinforced by sector-specific skill investments. Gender specialization is efficient.",
      "This framework dominated family economics for decades. The course systematically dismantles it using evidence from adoptive parents, same-sex couples, and cross-cultural variation."
    ]},
    {heading:"The Unitary Model and Its Replacement by Bargaining",points:[
      "Unitary model: family maximizes a single utility function subject to a pooled budget constraint. Income pooling: only total household income matters, not who receives it.",
      "Advantages: preserves standard demand theory. Disadvantages: pooling rejected empirically; cannot address household formation/dissolution; ignores intrahousehold distribution.",
      "Divorce-threat bargaining (McElroy & Horney, 1981): Nash bargaining where the threat point is utility if divorced. Outcomes depend on ‘extramarital environmental parameters’: remarriage prospects, welfare, labor market conditions.",
      "Separate spheres (Lundberg & Pollak, 1993): threat point is noncooperative equilibrium WITHIN marriage. Depends on individual income control and tolerance of conflict. Innovation: you don’t need to threaten divorce to have bargaining power.",
      "Central prediction: anything that improves your threat point shifts the allocation in your favor."
    ]},
    {heading:"Empirical Tests: Pooling Rejected",points:[
      "Lundberg, Pollak & Wales (1997): UK replaced Child Tax Allowance (reduced husband’s tax) with Child Benefit (cash payment to mothers), 1977–79. Amount roughly constant (£400/yr for 2 children). Result: significant shift toward women’s and children’s clothing. Rejects pooling. Method: quasi-natural experiment, UK Family Expenditure Survey.",
      "Duflo (2000): South African old-age pension expanded dramatically 1990–1993. Pensions received by grandmothers improved grandchildren’s height-for-age, especially for girls. Grandfather pensions had NO effect. Girls bridged approximately half the gap with American girls. Method: compare eligible vs. non-eligible households before/after expansion.",
      "Thomas (1990): In Brazil, mother’s income effect on child survival is approximately 20 times larger than father’s.",
      "Together: the unitary model is dead empirically. Who receives income determines how it’s spent."
    ]},
    {heading:"Divorce and Its Legal Framework",points:[
      "Stevenson & Wolfers (2007): U.S. divorce spiked 1960–1980, then declined steadily. The spike coincided with the shift from fault-based to no-fault (unilateral) divorce, starting with California in 1969.",
      "Economists expected no effect based on Coase theorem logic: if marital surplus is positive, couples should negotiate to stay. But unilateral divorce was massively cheaper and easier, triggering dissolution of the stock of unhappy marriages.",
      "Long-term effects: easier exit made marriage less useful as a commitment device, reducing specialization, marriage-specific investments, and overall marriage rates.",
      "Gruber (2004): children exposed to unilateral divorce regimes had lower incomes and education in adulthood.",
      "Halla (2013): joint custody laws increased marriage rates, fertility, and men’s wellbeing.",
      "Wong (2014, 2016): homemaker’s provision (recognizing homemaker contributions at divorce) increased women’s home specialization and marriage rates."
    ]},
    {heading:"Fertility as a Bargaining Problem",points:[
      "Doepke & Kindermann (2019): Using GGP data from 19 European countries, many couples DISAGREE about having children. Each partner has veto power — births unlikely unless both agree.",
      "Women are more likely to disagree in countries where men do less childcare and where mothers are less likely to be employed.",
      "Policy implication: childcare subsidies (reducing mothers’ specific costs) are more effective than cash bonuses for increasing fertility."
    ]}
  ]},
  {theme:"violence",title:"Intimate Partner Violence",week:"Week 5",content:[
    {heading:"Two Models of Violence",points:[
      "Expressive: loss of control under strong emotions, often combined with alcohol. Violence is impulsive.",
      "Instrumental: violence or threat of violence intended to control partner’s behavior. Violence is strategic.",
      "In practice these overlap. The same perpetrator can both lose control (expressive) and systematically sabotage a partner’s employment (instrumental)."
    ]},
    {heading:"Card & Dahl (2011) — Football and Violence",points:[
      "Data: NIBRS police reports of intimate partner violence on NFL Sundays. NFL betting market point spreads define ‘expected’ outcomes. Geographic identification of fan populations.",
      "An upset loss by the home team causes approximately a 10% increase in male-on-female at-home IPV.",
      "Other IPV spikes: Christmas +18%, Thanksgiving +20%, Memorial Day +30%, temperatures above 80°F +8%.",
      "Identification strength: the game outcome is exogenous to relationship dynamics. The betting spread isolates the ‘surprise’ component. Supports the expressive/loss-of-control model."
    ]},
    {heading:"Aizer (2010) — Relative Wages and IPV",points:[
      "Data: California female hospitalizations for assault (proxy for severe IPV), 1990–2003. Local wage growth in gender-segregated industries.",
      "Method: uses PREDICTED relative wages constructed from industry-level wage changes (not individual wages, which are endogenous to abuse). The gender segregation of industries provides the identifying variation.",
      "Narrowing of the gender wage gap explains approximately 9% of the decline in female assault hospitalizations. Effect concentrated on weekends (not just reduced exposure).",
      "Supports the bargaining/exit model: when women’s outside options improve, they can more credibly threaten to leave."
    ]},
    {heading:"Adams et al. (2024) — Dynamics of Abusive Relationships",points:[
      "Data: Finnish police reports linked to employer-employee data (FLEED) via unique national identifiers. Can track the SAME abuser across successive partners.",
      "Women’s earnings and employment fall IMMEDIATELY upon cohabiting with an eventually-abusive man — before any violence is reported to police.",
      "Men who are violent against anyone impose economic costs on ALL their female partners, even those who never file a report.",
      "Bridges both models: violent men both lose control AND strategically sabotage partners’ economic independence across successive relationships."
    ]},
    {heading:"The Empowerment Paradox (Unresolved)",points:[
      "High-income countries (Aizer 2010, Anderberg et al. 2016): improving women’s economic position REDUCES violence. Exit threat works.",
      "Patriarchal developing countries (Jayachandran 2021 cites multiple studies): women’s empowerment programs can INCREASE violence via male backlash.",
      "Key moderator: credible EXIT options. Where divorce is accessible, empowerment enables leaving. Where it isn’t, income without escape is provocation without an escape route.",
      "Field et al. (2021) designed their Indian bank account intervention to make women’s earnings LESS VISIBLE to husbands specifically to avoid triggering backlash.",
      "No unified theoretical model reconciles both directions. This is the sharpest unresolved contradiction in the course."
    ]}
  ]},
  {theme:"wagegap",title:"The Gender Wage Gap",week:"Weeks 6–7",content:[
    {heading:"Blau & Kahn (2000) — The Baseline Decomposition",points:[
      "Data: CPS/ACS, large representative U.S. samples. Method: Oaxaca-Blinder wage decomposition.",
      "Female/male earnings ratio: approximately 60% through 1980, rising to approximately 80% by the late 1990s.",
      "Controlling for human capital (education, experience): approximately 85% of the gap remains unexplained.",
      "Adding occupation and industry controls: approximately 40% remains unexplained.",
      "The interpretation problem: is occupation a CONTROL (women freely choose lower-paid jobs) or a MECHANISM (women are steered/excluded)? Adding it changes what ‘unexplained’ means. This tension organizes the entire wage gap literature."
    ]},
    {heading:"Niederle & Vesterlund (2011) — Gender and Competition",points:[
      "Lab experiment: 40 men and 40 women perform an addition task. Equal performance under both piece-rate and tournament compensation.",
      "73% of men versus 35% of women chose the tournament. Massive gap despite equal ability.",
      "Decomposition: approximately 1/3 of the gap is explained by overconfidence (75% of men vs. 43% of women believe they are the best in their group). The remaining 2/3 reflects aversion to competition itself, particularly in mixed-sex environments.",
      "Cross-cultural evidence: the gender gap in tournament entry is REVERSED in the matrilineal Khasi society (vs. patrilineal Maasai). Gaps do not appear until adolescence. No gap in Swedish children age 7–10.",
      "These patterns strongly suggest competition aversion is socially constructed, not biologically innate."
    ]},
    {heading:"Nelson’s Critique of Risk Aversion Literature",points:[
      "The broader literature finding women more ‘risk averse’ suffers from three systematic problems:",
      "1. Incorrect citation of prior results (studies cited as finding gender differences that actually found null effects).",
      "2. Selective emphasis on confirming results within studies that produced mixed findings.",
      "3. Statistical evidence of publication bias (the distribution of published standard errors is inconsistent with no true difference).",
      "The course assessment: the risk aversion literature is ‘now ambiguous.’ Results are context-dependent, domain-dependent, and disappear when controlling for income and family size."
    ]},
    {heading:"Goldin (2014) — Greedy Jobs and the Last Chapter",points:[
      "In some occupations, working 70 hours earns far more than twice what 35 hours earns. This nonlinearity exists because workers are imperfect substitutes — client-specific knowledge makes individual availability valuable.",
      "These ‘greedy jobs’ (law, finance, consulting) disproportionately penalize anyone who needs temporal flexibility — primarily mothers.",
      "Cross-occupational variation in the gender wage gap maps closely onto hours-nonlinearity: gap is largest in business and law, smallest in science, tech, and pharmacy.",
      "Implication: the ‘last chapter’ of convergence requires making workers more substitutable, not just reducing discrimination."
    ]},
    {heading:"Goldin & Katz (2016) — Pharmacy as Proof",points:[
      "Pharmacy underwent three transformations: corporate consolidation (CVS, Walgreens replaced independents), IT standardization (electronic prescription records via PBMs), and product standardization (manufactured vs. compounded drugs).",
      "Result: pharmacists became highly substitutable. Any qualified pharmacist can fill your prescription.",
      "Ownership premium: 16% in 1970, zero today. Part-time hourly penalty: nearly zero. Female share: under 5% (1960s) to over 60% (2000s).",
      "Gender earnings gap became the smallest of any high-paid profession. Once hours are controlled, the residual gap is nearly zero.",
      "This was market-driven, not policy-driven — distinguishing Goldin’s structural argument from the policy interventions tested by Kleven in Austria."
    ]},
    {heading:"Workplace Discrimination: New Generation of Studies",points:[
      "Sarsons (2019): referrals to female surgeons drop more sharply after a patient death and rise less after a good outcome, compared to identical events for male surgeons. Asymmetric updating of beliefs.",
      "Egan et al. (2022): female financial advisers are 20% more likely to lose their jobs and 30% less likely to find new ones after identical misconduct incidents. Gap smaller at firms with more female managers.",
      "Babcock et al. (2017): women volunteer more for, and are more often asked to perform, tasks that do not contribute to promotion (‘non-promotable work’). Driven by beliefs that women will say yes.",
      "Cullen & Perez-Truglia (2023): socializing with male managers during smoking breaks leads to higher promotion rates for male employees. Uses quasi-random manager rotations in a large bank.",
      "Folke & Rickne (2022): harassment deters minority-gender workers from applying to and staying in jobs, reinforcing occupational segregation and increasing the wage gap."
    ]}
  ]},
  {theme:"penalty",title:"The Motherhood Wage Penalty",week:"Week 7",content:[
    {heading:"Kleven, Landais & Søgaard (2019) — The Event Study",points:[
      "Data: Danish administrative records, 470,000 first births between 1985–2003, 15 million person-year observations.",
      "Method: event study tracking earnings from 5 years before to 20 years after first child. Year dummies control for labor market conditions; age dummies control for life-cycle effects.",
      "Women experience an immediate drop of approximately 30% in gross earnings. The penalty stabilizes at approximately 20% after 10 years — unchanged at 20 years. Men: essentially zero change.",
      "Mechanisms: employment exit, reduced hours, wage rate cuts, switching to public sector/family-friendly jobs, slower promotion (‘mommy-tracking’).",
      "Cross-country variation correlates with gender role ATTITUDES, not policy generosity. Intergenerational: grandmother’s work patterns predict daughter’s child penalty.",
      "In Denmark, non-child sources of gender inequality fell steadily 1980–2013 until child-related sources accounted for essentially ALL of the remaining gap."
    ]},
    {heading:"Kleven, Landais & Søgaard (2021) — Biology Ruled Out",points:[
      "Compared biological parents with adoptive parents in Danish admin data. Reweighted to match on year, number of children, mother’s age, education, and pre-child earnings.",
      "Result: NO long-run difference in child penalties. Slightly larger short-run drop for biological mothers (maternity leave/recovery), but vanishes within approximately 2 years.",
      "Authors’ conclusion: child-related gender inequality ‘cannot be understood through the lens of biology and incentive-based specialization, pushing toward a greater focus on preference formation, social norms, and culture.’",
      "This directly refutes Becker’s biological comparative advantage framework."
    ]},
    {heading:"Andresen & Nix (2022) — Same-Sex Couples Confirm Norms",points:[
      "Norwegian admin data on same-sex female couples.",
      "SMALLER child penalties than heterosexual mothers, and BOTH mothers reduce earnings (not just one).",
      "If biology drove the penalty, the birth mother should bear a disproportionate cost. She does not in the long run.",
      "Confirms that gender norms and discrimination, not biology, are the primary drivers."
    ]},
    {heading:"Kleven et al. (Austria, 2024) — Policy Fails",points:[
      "Three Austrian reforms (1990, 1996, 2000) changed parental leave duration (up to 30 months) and expanded public childcare.",
      "Effect on motherhood penalty: ZERO. Effect on fertility: ZERO.",
      "Why: (1) leave that long is a career interruption, not career support; (2) childcare expansion crowded out informal care from relatives; (3) ‘very strong maternal care norms’ meant mothers used the leave without changing career trajectories.",
      "Norway childcare subsidies: also zero employment effect (crowded out grandparent care). Quebec universal childcare: DID increase employment (universal, cheap, less informal care to displace)."
    ]},
    {heading:"Cross-Paper Synthesis: Goldin vs. Kleven",points:[
      "Goldin (2014, 2016): market restructuring (making workers substitutable) CAN close the gap. Pharmacy proves it. Demand-side mechanism.",
      "Kleven (Austria, 2024): government policy (leave, childcare subsidies) CANNOT close the gap. Supply-side mechanism.",
      "These are COMPLEMENTARY, not contradictory. They test different levers. Policy treats symptoms; restructuring treats the cause (worker non-substitutability). Both agree norms are the binding constraint underneath.",
      "The conversation the course wants you to have: neither lever alone is sufficient. Norms must change — but norms CAN change (Kleven 2019 shows intergenerational transmission, meaning each generation’s norms partly reflect the previous generation’s behavior)."
    ]}
  ]},
  {theme:"development",title:"Gender, Norms, and Economic Development",week:"Weeks 8–9",content:[
    {heading:"Jayachandran (2021) — Five Norm Barriers",points:[
      "Even controlling for economic development, enormous variation in women’s employment. Social norms explain the residual, operating through five channels:",
      "1. Safety: harassment and violence in public spaces and workplaces. In New Delhi, 95% of women aged 16–49 felt unsafe in public.",
      "2. Restricted mobility and social interaction: affects acceptable job sites and business networks.",
      "3. Control over household money: cash grants to female microentrepreneurs were ‘captured’ by household members. Mobile money and direct deposit are less visible alternatives.",
      "4. Male backlash: women’s empowerment programs can increase IPV in patriarchal settings.",
      "5. Unequal domestic burden: women have fewer hours, need more flexibility, and cannot travel for work.",
      "Religion matters: Hindu caste system (men outside family = ‘pollution’ for women), Muslim purdah (female seclusion). Explains South Asia and Middle East.",
      "Key insight: paid employment confers autonomy and power; unpaid home work does not. Consistent with bargaining models."
    ]},
    {heading:"Bursztyn, González & Yanagizawa-Drott (2020) — Saudi Pluralistic Ignorance",points:[
      "Data: 500 young married Saudi men (18–35) in Riyadh, plus 1,500-man national survey and 703-man online survey.",
      "Method: lab-in-field experiment. Anonymous responses. Incentivized belief elicitation (closest guess wins $20 gift card). Random assignment to information treatment. Follow-up at 3–5 months.",
      "87% of men privately support women working outside the home. But the average guess is that only 63% do. 72% of participants strictly underestimate peer support by an average of 24 percentage points.",
      "Treatment effect: telling men the true level of support increased wife job-service signup from 23.5% to 32% (+36%). At 3–5 months: wife job applications rose from 5.8% to 16.2% (+180%).",
      "Why misperceptions persist: men rarely discuss the topic with friends and relatives. Misperceptions are inversely correlated with frequency of discussion.",
      "National survey confirms: 82% of 1,500 men agree; 92% underestimate true support.",
      "Policy implication: ‘active information provision might be particularly important in less democratic societies, where natural information aggregators (elections, polls) are limited.’"
    ]},
    {heading:"Field, Jayachandran, Pande & Rigol (2021) — India Bank Accounts",points:[
      "Data: RCT in 197 village clusters in Madhya Pradesh (one of India’s most restrictive states for gender norms).",
      "Background: only 28% of women report having a say in whether they work. 74% of women agree women can work, but only 66% of husbands agree.",
      "Intervention: bank accounts + direct deposit of government workfare (MGNREGS) earnings into women’s personal accounts.",
      "Results: significant increase in women’s work, especially for previously non-working (‘constrained’) women. Effect persisted into long run (3 years) for constrained women.",
      "Norm effects: women’s own attitudes shifted positive. Men’s OWN attitudes did not change — but their PERCEPTION of community norms shifted. They realized others were more supportive than they had thought.",
      "The intervention was designed to make women’s earnings less visible to husbands — specifically to avoid triggering backlash.",
      "Connects to Bursztyn: both find that men’s PERCEPTION of community norms is the key lever."
    ]},
    {heading:"Deep Roots and Cautions",points:[
      "Alesina, Giuliano & Nunn (2013): regions with soil and terrain historically suitable for plough agriculture have lower female employment and more traditional gender attitudes TODAY. Culture created by agricultural technology persists centuries beyond the conditions that produced it.",
      "Boserup (1970): hypothesized that plough vs. hoe agriculture created lasting gender norms. Men’s comparative advantage in plough use (upper-body strength) excluded women from farming in plough societies.",
      "Duflo (2012): the empirical link from women’s empowerment to economic growth is ‘not transformational.’ Effects are positive but modest. Gender equality should be pursued as a fundamental objective, not merely as a means to growth. Challenges World Bank (2001) orthodoxy."
    ]}
  ]},
  {theme:"sogie",title:"Sexual Orientation and Gender Identity",week:"Week 10",content:[
    {heading:"Badgett, Carpenter, Lee & Sansone (2024) — Four Stylized Facts",points:[
      "1. Gay men earn LESS than heterosexual men (gay penalty, typically 5–15%).",
      "2. Lesbian women earn MORE than heterosexual women (lesbian premium, typically 5–10%).",
      "3. Transgender individuals earn LESS than cisgender individuals.",
      "4. Bisexual individuals often have the worst labor market outcomes.",
      "Data challenges: disclosure bias (less-educated LGBTQ+ less likely to disclose), small samples, couples-only identification (misses single LGBTQ+ individuals). Twin studies (Amin et al. 2021) help address selection."
    ]},
    {heading:"Connections to Course Frameworks",points:[
      "Gay penalty connects to masculinity norms: men punished for perceived norm violation. Links to boys’ educational problems (oppositional culture), men’s avoidance of female-coded jobs, and competition as gendered behavior.",
      "Lesbian premium connects to specialization: less household specialization, more continuous work experience, fewer child-related career interruptions. Becker’s model fails because same-sex couples specialize LESS even with children.",
      "Schilt & Wiswall (2008): the cleanest possible discrimination test. Within-person comparison before and after gender transition — same skills, same education, different perceived gender. Trans women face large penalties; trans men face smaller penalties or gains. Directly isolates gender discrimination from productivity.",
      "Geijtenbeek & Plug (2018): replicates the trans wage pattern in Dutch administrative data.",

function Pomodoro(){

  const ref=useRef();
  useEffect(()=>{if(run){ref.current=setInterval(()=>setTl(t=>{if(t<=1){clearInterval(ref.current);setRun(false);if(mode==="work"){setSess(s=>s+1);setMode("break");return 300}else{setMode("work");return 1500}}return t-1}),1000)}return()=>clearInterval(ref.current)},[run,mode]);
  const m=Math.floor(tl/60),s=tl%60,total=mode==="work"?1500:300,pct=((total-tl)/total)*100;
  return React.createElement('div',{style:{textAlign:'center',padding:'2rem 1rem'}},
    React.createElement('div',{style:{fontSize:11,textTransform:'uppercase',letterSpacing:2.5,color:'var(--ts2)',marginBottom:12}},mode==="work"?"\u2727 focus session \u2727":"\u2615 break time \u2615"),

    ),
    React.createElement('div',{style:{display:'flex',gap:3,justifyContent:'center',padding:'8px 0',flexWrap:'wrap'}},
      modes.map(m=>React.createElement('button',{key:m.id,className:'pill'+(mode===m.id?' on':''),onClick:()=>setMode(m.id)},m.e+' '+m.label))
    ),
    needsFilter && React.createElement('div',{style:{display:'flex',gap:3,padding:'4px 0 14px',flexWrap:'wrap',justifyContent:'center'}},
      THEMES.map(t=>React.createElement('button',{key:t.id,className:'thpill'+(theme===t.id?' on':''),onClick:()=>setTheme(t.id)},t.label))
    ),
    React.createElement('div',{className:'card'},
      mode==='learn' && React.createElement(Learn,{theme}),
      mode==='flashcards' && React.createElement(Flashcards,{cards:fc,onStudy:()=>updateStats('flashcardsStudied',v=>v+1)}),
      mode==='quiz' && React.createElement(Quiz,{questions:fq,onComplete:(s,t)=>{updateStats('quizzesTaken',v=>v+1);updateStats('quizHighScore',v=>Math.max(v,Math.round(s/t*100)))}}),
      mode==='exam' && React.createElement(PracticeExam,{questions:fq}),
      mode==='matchup' && React.createElement(Matchup,{onComplete:()=>updateStats('matchupsCompleted',v=>v+1)}),
      mode==='blitz' && React.createElement(NumberBlitz,{onComplete:(s)=>updateStats('blitzHighScore',v=>Math.max(v,s))}),
      mode==='connection' && React.createElement(ConnectionChallenge,{onView:()=>updateStats('connectionsViewed',v=>v+1)}),
      mode==='tfu' && React.createElement(TFUShowdown,{onAnswer:(c)=>{updateStats('tfuTotal',v=>v+1);if(c)updateStats('tfuCorrect',v=>v+1)}}),
      mode==='timer' && React.createElement(Pomodoro,null),
      mode==='stats' && React.createElement('div',{style:{padding:'1rem'}},
        React.createElement('div',{style:{fontSize:18,fontWeight:700,marginBottom:16,textAlign:'center'}},'Your progress'),
        [{label:'Flashcards studied',val:stats.flashcardsStudied,color:'var(--accent)'},
         {label:'Quizzes completed',val:stats.quizzesTaken,color:'var(--blue)'},
         {label:'Quiz high score',val:stats.quizHighScore+'%',color:'var(--green)'},
         {label:'Blitz high score',val:stats.blitzHighScore+' in 60s',color:'var(--gold)'},
         {label:'Matchups completed',val:stats.matchupsCompleted,color:'var(--coral)'},
         {label:'T/F/U accuracy',val:stats.tfuTotal>0?Math.round(stats.tfuCorrect/stats.tfuTotal*100)+'%':'--',color:'var(--accent)'},
         {label:'Connections viewed',val:stats.connectionsViewed+'/'+CONNECTION_PAIRS.length,color:'var(--blue)'},
        ].map((item,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',marginBottom:6,borderRadius:8,background:'var(--bg2)'}},
          React.createElement('span',{style:{fontSize:13,color:'var(--ts2)'}},item.label),
          React.createElement('span',{style:{fontSize:15,fontWeight:700,color:item.color}},item.val)
        ))
      )
    ),
    React.createElement('div',{style:{textAlign:'center',padding:'14px 0',fontSize:12,color:'var(--tt)',fontStyle:'italic'}},'Final Exam: Wed Mar 18, 7:30 PM \u00b7 You\u2019ve got this \u2727')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
